<!DOCTYPE html>

<html>
<head>
  <title>Mass Mobiles Admin</title>
</head>
<body>

<h2>Admin Panel</h2>

<input id="name" placeholder="Mobile Name"><br><br> <input id="image" placeholder="Image URL"><br><br> <input id="price" placeholder="Price"><br><br> <input id="stock" placeholder="Stock"><br><br>

<button onclick="addMobile()">Add Mobile</button>

<h3>Update Offer</h3>
<input id="offer"><br><br>
<button onclick="updateOffer()">Update Offer</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0W99mqlABKXhuivFKEHH6c3LC2JGzQGA",
  authDomain: "mass-mobiles-fb016.firebaseapp.com",
  projectId: "mass-mobiles-fb016",
  storageBucket: "mass-mobiles-fb016.firebasestorage.app",
  messagingSenderId: "413904676588",
  appId: "1:413904676588:web:b0e3093d450ea852a767c9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addMobile = async function() {
  await addDoc(collection(db, "mobiles"), {
    name: document.getElementById("name").value,
    image: document.getElementById("image").value,
    price: document.getElementById("price").value,
    stock: Number(document.getElementById("stock").value)
  });
  alert("Mobile Added ✅");
};

window.updateOffer = async function() {
  await setDoc(doc(db, "offers", "main"), {
    text: document.getElementById("offer").value
  });
  alert("Offer Updated ✅");
};
</script>

</body>
</html>
