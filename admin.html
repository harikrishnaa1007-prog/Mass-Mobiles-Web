<!DOCTYPE html>

<html>
<head>
  <title>Mass Mobiles Admin</title>
</head>
<body>

<h2>Admin Panel - Mass Mobiles</h2>

<input id="name" placeholder="Mobile Name"><br><br> <input id="image" placeholder="Image URL"><br><br> <input id="price" placeholder="Price"><br><br> <input id="stock" placeholder="Stock"><br><br>

<button onclick="addMobile()">Add Mobile</button>

<h3>Update Offer</h3>
<input id="offer"><br><br>
<button onclick="updateOffer()">Update Offer</button>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  // 🔴 PASTE YOUR FIconst firebaseConfig = {
  apiKey: "AIzaSyB0W99mqlABKXhuivFKEHH6c3LC2JGzQGA",
  authDomain: "mass-mobiles-fb016.firebaseapp.com",
  projectId: "mass-mobiles-fb016",
  storageBucket: "mass-mobiles-fb016.firebasestorage.app",
  messagingSenderId: "413904676588",
  appId: "1:413904676588:web:b0e3093d450ea852a767c9"
};REBASE CONFIG HERE
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function addMobile() {
  db.collection("mobiles").add({
    name: name.value,
    image: image.value,
    price: price.value,
    stock: stock.value
  });
  alert("Mobile Added");
}

function updateOffer() {
  db.collection("offers").doc("main").set({
    text: offer.value
  });
  alert("Offer Updated");
}
</script>

</body>
</html>
